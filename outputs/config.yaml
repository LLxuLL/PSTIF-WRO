data:
  data_path: ./data/raw
  dataset_name: nyc_taxi
  handle_missing: true
  normalize: true
  num_workers: 4
  test_ratio: 0.15
  train_ratio: 0.7
  val_ratio: 0.15
experiment:
  checkpoint_dir: ./checkpoints
  device: cuda
  eval_interval: 1
  log_dir: ./logs
  log_interval: 10
  name: pstif_wro_experiment
  output_dir: ./outputs
  save_interval: 10
  seed: 42
model:
  dropout: 0.5
  hidden_dim: 2048
  input_dim: 11
  measure_dim: 32
  num_attributes: 11
  num_partitions: 4
  use_contrastive: true
  use_robust: true
training:
  batch_size: 1024
  epochs: 200
  grad_clip: 1.0
  lambda_completion: 0.01
  lambda_gp: 0.001
  lambda_robust: 0.01
  learning_rate: 0.002
  optimizer: adamw
  patience: 20
  ranking_loss: bce
  scheduler: plateau
  temperature: 1.0
  weight_decay: 0.0001
